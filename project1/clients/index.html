<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CSCE 548 Project 3 Client</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; max-width: 1100px; }
    .row { display: flex; gap: 18px; flex-wrap: wrap; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px; flex: 1; min-width: 320px; }
    label { display:block; margin-top:10px; font-weight: 600; }
    input, select, textarea { width: 100%; padding: 8px; margin-top: 6px; }
    button { margin-top: 10px; padding: 8px 12px; cursor: pointer; }
    pre { background:#f6f6f6; padding: 12px; border-radius: 8px; overflow:auto; max-height: 420px; }
    .muted { color:#666; font-size: 0.9em; }
    .error { color:#b00020; font-weight: 700; }
  </style>
</head>
<body>
  <h1>CSCE 548 – Project 3 Web Client</h1>
  <p class="muted">Select a resource/table and use the controls below to call your Project 2 services.</p>

  <div class="card">
    <label>API Base URL</label>
    <input id="baseUrl" value="http://127.0.0.1:5000" />
    <label>Resource / Table</label>
    <select id="resourceSelect"></select>
    <div class="muted" id="resourceMeta"></div>
  </div>

  <div class="row">
    <div class="card">
      <h3>GET Methods (Required)</h3>

      <button onclick="getAll()">GET All</button>

      <label>Get By ID</label>
      <input id="getId" placeholder="e.g., 1" />
      <button onclick="getById()">GET By ID</button>

      <label>Get Subset (query params)</label>
      <input id="subsetQuery" placeholder="e.g., limit=10 or limit=10&severity=HIGH" />
      <button onclick="getSubset()">GET Subset</button>
    </div>

    <div class="card">
      <h3>CRUD (Graduate Credit)</h3>

      <label>Create (POST JSON)</label>
      <textarea id="createJson" rows="6" placeholder='{"field":"value"}'></textarea>
      <button onclick="createRecord()">POST Create</button>

      <label>Update By ID (PUT JSON)</label>
      <input id="updateId" placeholder="id to update" />
      <textarea id="updateJson" rows="6" placeholder='{"field":"newValue"}'></textarea>
      <button onclick="updateRecord()">PUT Update</button>

      <label>Delete By ID</label>
      <input id="deleteId" placeholder="id to delete" />
      <button onclick="deleteRecord()">DELETE</button>
    </div>
  </div>

  <div class="card">
    <h3>Response</h3>
    <div id="status" class="muted"></div>
    <div id="error" class="error"></div>
    <pre id="output">{}</pre>
  </div>

<script>
  // ====== EDIT THIS CONFIG TO MATCH YOUR PROJECT 2 API ======
  // Each resource should match your Flask routes.
  // Example assumes routes like:
  // GET    /vulnerabilities
  // GET    /vulnerabilities/<id>
  // POST   /vulnerabilities
  // PUT    /vulnerabilities/<id>
  // DELETE /vulnerabilities/<id>
const API_CONFIG = {
  vendors: {
    pk: "vendor_id",
    fields: ["name", "website"]
  },
  products: {
    pk: "product_id",
    fields: ["vendor_id", "name", "version", "platform"]
  },
  vulnerabilities: {
    pk: "vuln_id",
    fields: ["product_id", "cve_id", "title", "description", "severity", "cvss", "published_date", "status"],
    update: { method: "PATCH", pathSuffix: "/status", onlyField: "status" }
  },
  references: {
    pk: "ref_id",
    fields: ["vuln_id", "ref_type", "url", "note"]
  },
  tags: {
    pk: "tag_id",
    fields: ["name"]
  },
  "vulnerability-tags": {
    pk: "vuln_id,tag_id",
    fields: ["vuln_id", "tag_id"],
    composite: true
  }
};
  // ===========================================================

  const resourceSelect = document.getElementById("resourceSelect");
  const resourceMeta = document.getElementById("resourceMeta");

  function currentResource() {
    return resourceSelect.value;
  }
  function baseUrl() {
    return document.getElementById("baseUrl").value.replace(/\/+$/, "");
  }

  function setStatus(msg) {
    document.getElementById("status").textContent = msg || "";
  }
  function setError(msg) {
    document.getElementById("error").textContent = msg || "";
  }
  function setOutput(obj) {
    document.getElementById("output").textContent = JSON.stringify(obj, null, 2);
  }

  function updateMeta() {
    const r = currentResource();
    const meta = API_CONFIG[r];
    resourceMeta.textContent = meta
      ? `PK: ${meta.pk} | Fields: ${meta.fields.join(", ")}`
      : "";
  }

  function populateResources() {
    resourceSelect.innerHTML = "";
    Object.keys(API_CONFIG).forEach(r => {
      const opt = document.createElement("option");
      opt.value = r;
      opt.textContent = r;
      resourceSelect.appendChild(opt);
    });
    updateMeta();
  }
  resourceSelect.addEventListener("change", updateMeta);

  async function request(path, options = {}) {
    setError("");
    setStatus(`Request: ${options.method || "GET"} ${baseUrl()}${path}`);
    const res = await fetch(`${baseUrl()}${path}`, {
      headers: { "Content-Type": "application/json", ...(options.headers || {}) },
      ...options
    });

    const text = await res.text();
    let data;
    try { data = text ? JSON.parse(text) : {}; }
    catch { data = { raw: text }; }

    if (!res.ok) {
      setError(`HTTP ${res.status}: ${res.statusText}`);
    }
    setOutput({ ok: res.ok, status: res.status, data });
    return { res, data };
  }

  // ---- GET methods ----
  async function getAll() {
    const r = currentResource();
    return request(`/${r}`);
  }

  async function getById() {
    const r = currentResource();
    const id = document.getElementById("getId").value.trim();
    if (!id) return setError("Enter an ID for GET by ID.");
    return request(`/${r}/${encodeURIComponent(id)}`);
  }

  async function getSubset() {
    const r = currentResource();
    const q = document.getElementById("subsetQuery").value.trim();
    const suffix = q ? `?${q}` : "";
    return request(`/${r}${suffix}`);
  }

  // ---- CRUD ----
  async function createRecord() {
    const r = currentResource();
    const raw = document.getElementById("createJson").value.trim();
    if (!raw) return setError("Enter JSON for create.");
    let body;
    try { body = JSON.stringify(JSON.parse(raw)); }
    catch { return setError("Create JSON is invalid."); }
    return request(`/${r}`, { method: "POST", body });
  }

  async function updateRecord() {
    const r = currentResource();
    const id = document.getElementById("updateId").value.trim();
    if (!id) return setError("Enter an ID for update.");
    const raw = document.getElementById("updateJson").value.trim();
    if (!raw) return setError("Enter JSON for update.");
    let body;
    try { body = JSON.stringify(JSON.parse(raw)); }
    catch { return setError("Update JSON is invalid."); }
    return request(`/${r}/${encodeURIComponent(id)}`, { method: "PUT", body });
  }

  async function deleteRecord() {
    const r = currentResource();
    const id = document.getElementById("deleteId").value.trim();
    if (!id) return setError("Enter an ID for delete.");
    return request(`/${r}/${encodeURIComponent(id)}`, { method: "DELETE" });
  }

  populateResources();
</script>
</body>
</html>
